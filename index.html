<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Викторина</title>
    <!-- ═══════════════════════════════════════════════════════════════════════
         ГЛАССМОРФИЗМ + ТЕМАТИЧЕСКИЙ ДИЗАЙН
         :root - менять цвета под тему викторины
         ═══════════════════════════════════════════════════════════════════════ -->
    <style>
        /* ═══════════════════════════════════════════════════════════════════
           ЦВЕТА ТЕМЫ - МЕНЯТЬ ПОД КОНКРЕТНУЮ ВИКТОРИНУ
           ═══════════════════════════════════════════════════════════════════ */
        :root {
            /* Основные цвета темы */
            --primary-color: #0f0;           /* Зелёный (для кибер-темы) */
            --secondary-color: #ff00ff;       /* Розовый (акцент) */
            --text-color: #fff;                /* Цвет текста */
            
            /* Градиент фона */
            --bg-gradient-start: #0a0a0a;      /* Тёмно-серый */
            --bg-gradient-end: #1a1a1a;         /* Чуть светлее */
            
            /* Параметры глассморфизма */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-blur: 10px;
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* Градиентный фон */
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        .glass-container {
            max-width: 600px;
            width: 90%;
            padding: 50px;
            
            /* Глассморфизм */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--glass-shadow);
            
            /* Анимация появления */
            animation: fadeIn 0.5s ease-out;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--primary-color);
            text-shadow: 0 0 20px var(--primary-color);
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 50px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.9;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .btn {
            display: block;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 15px;
            transition: all 0.3s;
            
            /* Глассморфизм для кнопок */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            color: var(--text-color);
        }
        
        .btn:hover {
            transform: translateY(-5px);
            border-color: var(--primary-color);
            box-shadow: 0 0 30px var(--primary-color);
        }
        
        .btn.teacher {
            border-color: var(--secondary-color);
            color: var(--secondary-color);
        }
        
        .btn.teacher:hover {
            box-shadow: 0 0 30px var(--secondary-color);
        }
        
        .footer {
            margin-top: 50px;
            text-align: center;
            color: var(--text-color);
            opacity: 0.5;
            font-size: 0.9rem;
        }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>🎯 ВИКТОРИНА</h1>
        <p class="subtitle">Проверь свои знания!</p>
        
        <div class="buttons">
            <a href="teacher.html" class="btn teacher">👨‍🏫 УЧИТЕЛЬ</a>
            <a href="student.html" class="btn">🧑‍🎓 УЧЕНИК</a>
        </div>
        
        <div class="footer">
            ⚡ Глассморфизм • Realtime • Мультиплеер
        </div>
    </div>
</body>
</html>
