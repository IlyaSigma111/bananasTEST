<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍌 Банановая викторина</title>
    
    <!-- ═══════════════════════════════════════════════════════════════════════
         БАНАНОВЫЙ ГЛАССМОРФИЗМ - ПРИНЦИПЫ:
         
         1. ФОН: градиент от светло-жёлтого к золотистому
            - Создаёт ощущение спелого банана
          
         2. СТЕКЛО: полупрозрачное с кремовым оттенком
            - Добавляет глубину и современность
            - Используем backdrop-filter: blur()
          
         3. АКЦЕНТЫ: коричневый (цвет хвостика банана)
            - Контраст с жёлтым
            - Создаёт фокус на важных элементах
          
         4. ТЕНИ: мягкие, жёлтые
            - Усиливают эффект свечения
         
         ═══════════════════════════════════════════════════════════════════════ -->
    <style>
        /* ═══════════════════════════════════════════════════════════════════
           ЦВЕТА ТЕМЫ - банановая палитра
           ═══════════════════════════════════════════════════════════════════ */
        :root {
            /* Основные банановые цвета */
            --banana-yellow: #FFE135;        /* Ярко-жёлтый (спелый банан) */
            --banana-gold: #FFD700;           /* Золотистый */
            --banana-dark: #8B4513;            /* Коричневый (хвостик банана) */
            --banana-cream: #FFF9C4;           /* Кремовый (мякоть) */
            --banana-green: #6B8E23;            /* Зелёный (недозрелый) */
            
            /* Цвета текста */
            --text-light: #FFF9C4;              /* Светлый текст */
            --text-dark: #5A3E1B;                /* Тёмный текст (для контраста) */
            
            /* Градиент фона - от кремового к золотому */
            --bg-gradient-start: #FFF9C4;
            --bg-gradient-end: #FFD700;
            
            /* Параметры глассморфизма */
            --glass-bg: rgba(255, 249, 196, 0.2);  /* Полупрозрачный кремовый */
            --glass-border: rgba(139, 69, 19, 0.3); /* Коричневая граница */
            --glass-blur: 10px;
            --glass-shadow: 0 8px 32px 0 rgba(255, 215, 0, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* Банановый градиент */
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        .glass-container {
            max-width: 600px;
            width: 90%;
            padding: 50px;
            
            /* ГЛАССМОРФИЗМ - основа */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 60px 60px 30px 30px;  /* Форма банана */
            box-shadow: var(--glass-shadow);
            
            /* Анимация появления */
            animation: floatIn 0.5s ease-out;
        }
        
        h1 {
            font-size: 3rem;
            margin-bottom: 20px;
            text-align: center;
            color: var(--text-dark);
            text-shadow: 2px 2px 0 var(--banana-yellow);
        }
        
        .subtitle {
            font-size: 1.2rem;
            margin-bottom: 50px;
            text-align: center;
            color: var(--text-dark);
            opacity: 0.9;
        }
        
        .buttons {
            display: flex;
            flex-direction: column;
            gap: 20px;
        }
        
        .btn {
            display: block;
            padding: 20px;
            text-align: center;
            text-decoration: none;
            font-size: 1.5rem;
            font-weight: bold;
            border-radius: 30px;  /* Скруглённые как банан */
            transition: all 0.3s;
            
            /* Глассморфизм для кнопок */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
        }
        
        .btn:hover {
            transform: translateY(-5px) scale(1.02);
            border-color: var(--banana-dark);
            box-shadow: 0 0 30px var(--banana-yellow);
        }
        
        .btn.teacher {
            border-color: var(--banana-dark);
            color: var(--banana-dark);
        }
        
        .footer {
            margin-top: 50px;
            text-align: center;
            color: var(--text-dark);
            opacity: 0.7;
            font-size: 0.9rem;
        }
        
        @keyframes floatIn {
            from {
                opacity: 0;
                transform: translateY(20px) rotate(-2deg);
            }
            to {
                opacity: 1;
                transform: translateY(0) rotate(0);
            }
        }
    </style>
</head>
<body>
    <div class="glass-container">
        <h1>🍌 БАНАНОВАЯ<br>ВИКТОРИНА</h1>
        <p class="subtitle">Проверь свои знания о бананах!</p>
        
        <div class="buttons">
            <a href="teacher.html" class="btn teacher">👨‍🏫 УЧИТЕЛЬ</a>
            <a href="student.html" class="btn">🧑‍🎓 УЧЕНИК</a>
        </div>
        
        <div class="footer">
            ⚡ 10 вопросов • Банановый глассморфизм • Realtime
        </div>
    </div>
</body>
</html>
