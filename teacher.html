<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍌 Учитель - Банановая викторина</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <style>
        :root {
            --banana-yellow: #FFD700;
            --banana-bright: #FFE55C;
            --banana-dark: #8B4513;
            --banana-brown: #A0522D;
            --banana-cream: #FFF9E6;
            
            --text-dark: #4A2C1A;
            --text-light: #FFF9E6;
            
            --bg-gradient-start: #FFF9E6;
            --bg-gradient-end: #FFD700;
            
            --glass-bg: rgba(255, 250, 240, 0.4);
            --glass-bg-dark: rgba(139, 69, 19, 0.15);
            --glass-border: rgba(139, 69, 19, 0.5);
            --glass-blur: 12px;
            --glass-shadow: 0 8px 32px rgba(139, 69, 19, 0.3);
            
            --easy-color: #2E8B57;
            --medium-color: #FF8C00;
            --hard-color: #DC143C;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        #mainInterface {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        
        .teacher-header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-bottom: 3px solid var(--banana-dark);
            box-shadow: 0 4px 10px rgba(139, 69, 19, 0.2);
        }
        
        .header-left h1 {
            font-size: 1.8rem;
            color: var(--banana-dark);
            text-shadow: 2px 2px 0 var(--banana-yellow);
        }
        
        .game-code-box {
            padding: 12px 25px;
            display: flex;
            align-items: center;
            gap: 20px;
            
            background: var(--banana-dark);
            border-radius: 40px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.3);
        }
        
        .game-code-box span {
            color: var(--banana-yellow);
            font-weight: bold;
            font-size: 1.1rem;
        }
        
        .code-display {
            font-size: 2.2rem;
            font-weight: 900;
            color: var(--banana-yellow);
            letter-spacing: 3px;
            min-width: 180px;
            text-align: center;
            text-shadow: 2px 2px 0 rgba(0,0,0,0.3);
        }
        
        .glass-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            padding: 12px 25px;
            font-size: 1rem;
            font-weight: bold;
            border: none;
            border-radius: 40px;
            cursor: pointer;
            background: var(--banana-yellow);
            color: var(--banana-dark);
            transition: all 0.3s;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .glass-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 8px 20px rgba(139, 69, 19, 0.4);
            background: #FFE55C;
        }
        
        .glass-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
            box-shadow: none;
        }
        
        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }
        
        .left-column, .right-column {
            width: 50%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }
        
        .glass-panel {
            padding: 20px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 2px solid var(--banana-dark);
            box-shadow: var(--glass-shadow);
        }
        
        .glass-panel h2 {
            color: var(--banana-dark);
            margin-bottom: 15px;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 10px;
            border-bottom: 2px solid var(--banana-dark);
            padding-bottom: 10px;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           ПЕРЕКЛЮЧАТЕЛЬ РЕЖИМОВ
           ═══════════════════════════════════════════════════════════════════ */
        .mode-toggle {
            display: flex;
            background: var(--glass-bg-dark);
            border: 2px solid var(--banana-dark);
            border-radius: 40px;
            padding: 5px;
            margin-bottom: 15px;
        }
        
        .mode-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 35px;
            cursor: pointer;
            font-size: 1rem;
            font-weight: bold;
            transition: all 0.3s;
            background: transparent;
            color: var(--text-dark);
        }
        
        .mode-btn.active {
            background: var(--banana-yellow);
            color: var(--banana-dark);
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
        
        .control-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
            transition: all 0.3s;
        }
        
        .control-buttons.hidden {
            display: none;
        }
        
        .control-buttons .glass-btn {
            padding: 15px;
            font-size: 1.1rem;
            justify-content: flex-start;
            background: var(--glass-bg-dark);
            color: var(--text-dark);
            border: 2px solid var(--banana-dark);
        }
        
        .control-buttons .glass-btn:hover {
            background: var(--banana-yellow);
            border-color: var(--banana-dark);
        }
        
        .info-block {
            padding: 15px;
            margin-top: 15px;
            border-radius: 20px;
            
            background: var(--glass-bg-dark);
            border: 2px solid var(--banana-dark);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            font-size: 1.1rem;
            color: var(--text-dark);
        }
        
        .info-value {
            color: var(--banana-dark);
            font-weight: 700;
            font-size: 1.3rem;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin: 15px 0;
        }
        
        .stat-card {
            padding: 15px;
            text-align: center;
            border-radius: 20px;
            
            background: var(--glass-bg-dark);
            border: 2px solid var(--banana-dark);
            color: var(--text-dark);
        }
        
        .stat-value {
            font-size: 2.2rem;
            font-weight: bold;
            color: var(--banana-dark);
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           УЧАСТНИКИ - ДВА РЕЖИМА
           ═══════════════════════════════════════════════════════════════════ */
        .players-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
            transition: all 0.3s;
        }
        
        /* Режим управления - игроки внизу, компактно */
        .players-container.control-mode {
            max-height: 30vh;
        }
        
        /* Режим статистики - игроки на всё свободное место */
        .players-container.stats-mode {
            max-height: none;
        }
        
        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(180px, 1fr));
            gap: 15px;
        }
        
        .player-card {
            padding: 15px;
            text-align: center;
            border-radius: 20px;
            transition: 0.3s;
            
            background: var(--glass-bg-dark);
            border: 3px solid var(--banana-dark);
            color: var(--text-dark);
        }
        
        .player-card.answered {
            border-color: var(--banana-yellow);
            background: rgba(255, 215, 0, 0.2);
            box-shadow: 0 0 20px var(--banana-yellow);
        }
        
        .player-avatar {
            width: 70px;
            height: 70px;
            background: var(--banana-yellow);
            color: var(--banana-dark);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: 900;
            border: 3px solid var(--banana-dark);
        }
        
        .questions-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 12px;
        }
        
        .question-item {
            padding: 15px 8px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            transition: 0.3s;
            
            background: var(--glass-bg-dark);
            border: 3px solid var(--banana-dark);
            color: var(--text-dark);
        }
        
        .question-item:hover {
            transform: scale(1.05);
            border-color: var(--banana-yellow);
            box-shadow: 0 0 20px var(--banana-yellow);
        }
        
        .question-item.active {
            border-color: var(--banana-yellow);
            background: rgba(255, 215, 0, 0.3);
            box-shadow: 0 0 25px var(--banana-yellow);
        }
        
        .question-number {
            font-size: 1.5rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .question-difficulty {
            font-size: 0.8rem;
            margin-bottom: 5px;
            font-weight: bold;
        }
        
        .question-status {
            font-size: 1.3rem;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: var(--text-dark);
            font-size: 1.2rem;
        }
        
        .hidden { display: none; }
        
        #presentationMode {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: none;
            flex-direction: column;
            
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        #presentationMode.active {
            display: flex;
        }
        
        .presentation-header {
            padding: 20px 40px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            
            background: var(--banana-dark);
            color: var(--banana-yellow);
            border-bottom: 4px solid var(--banana-yellow);
        }
        
        .presentation-header span {
            font-size: 1.3rem;
            font-weight: bold;
        }
        
        .presentation-header .stats {
            font-size: 1.4rem;
        }
        
        .presentation-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .presentation-question {
            max-width: 1000px;
            width: 100%;
            padding: 60px;
            text-align: center;
            
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 4px solid var(--banana-dark);
            border-radius: 60px;
            box-shadow: var(--glass-shadow);
        }
        
        .presentation-question h2 {
            font-size: 4rem;
            line-height: 1.4;
            margin-bottom: 40px;
            color: var(--banana-dark);
            text-shadow: 3px 3px 0 var(--banana-yellow);
        }
        
        .presentation-answer {
            font-size: 3rem;
            color: var(--banana-dark);
            background: var(--banana-yellow);
            padding: 30px;
            border-radius: 40px;
            margin: 30px 0;
            border: 4px solid var(--banana-dark);
            display: none;
        }
        
        .presentation-answer.show {
            display: block;
            animation: popIn 0.5s;
        }
        
        .presentation-controls {
            padding: 30px;
            text-align: center;
            border-top: 4px solid var(--banana-dark);
            background: var(--glass-bg);
        }
        
        .presentation-controls .glass-btn {
            display: inline-block;
            margin: 0 15px;
            padding: 18px 40px;
            font-size: 1.3rem;
        }
        
        @keyframes popIn {
            0% { transform: scale(0.8); opacity: 0; }
            100% { transform: scale(1); opacity: 1; }
        }
    </style>
</head>
<body>
    <div id="mainInterface">
        <header class="teacher-header">
            <div class="header-left">
                <h1>🍌 БАНАНОВАЯ ВИКТОРИНА</h1>
            </div>
            <div class="game-code-box">
                <span>🍌 КОД:</span>
                <div id="gameCode" class="code-display">----</div>
                <a href="index.html" class="glass-btn">
                    <i class="fas fa-home"></i> Главная
                </a>
            </div>
        </header>

        <div class="main-content">
            <div class="left-column">
                <div class="glass-panel">
                    <h2><i class="fas fa-gamepad"></i> УПРАВЛЕНИЕ / СТАТИСТИКА</h2>
                    
                    <!-- Переключатель режимов -->
                    <div class="mode-toggle">
                        <button class="mode-btn active" onclick="switchMode('control')" id="modeControl">🎮 Управление</button>
                        <button class="mode-btn" onclick="switchMode('stats')" id="modeStats">📊 Статистика</button>
                    </div>
                    
                    <div id="startSection">
                        <button onclick="createGame()" class="glass-btn control-buttons">
                            <i class="fas fa-plus-circle"></i> 🍌 СОЗДАТЬ НОВУЮ ИГРУ
                        </button>
                    </div>

                    <div id="gameControls" class="hidden">
                        <!-- Панель управления (скрывается в режиме статистики) -->
                        <div id="controlPanel" class="control-buttons">
                            <button onclick="showQuestionOnBoard(currentQuestionIndex)" id="showCurrentBtn" class="glass-btn">
                                <i class="fas fa-play"></i> ПОКАЗАТЬ ТЕКУЩИЙ ВОПРОС
                            </button>
                            <button onclick="showAnswerOnBoard()" id="showAnswerBtn" class="glass-btn" disabled>
                                <i class="fas fa-check-circle"></i> ПОКАЗАТЬ ОТВЕТ
                            </button>
                            <button onclick="nextQuestion()" id="nextBtn" class="glass-btn" disabled>
                                <i class="fas fa-forward"></i> СЛЕДУЮЩИЙ ВОПРОС
                            </button>
                            <button onclick="finishGame()" class="glass-btn">
                                <i class="fas fa-flag-checkered"></i> ЗАВЕРШИТЬ ИГРУ
                            </button>
                            <button onclick="resetGame()" class="glass-btn">
                                <i class="fas fa-redo"></i> СБРОСИТЬ
                            </button>
                        </div>
                        
                        <!-- Статистика (видна всегда) -->
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value" id="totalPlayers">0</div>
                                <div>🍌 Игроков</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="answeredCount">0</div>
                                <div>✅ Ответили</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="correctCount">0</div>
                                <div>⭐ Правильно</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="wrongCount">0</div>
                                <div>❌ Неправильно</div>
                            </div>
                        </div>
                        
                        <div class="info-block">
                            <div class="info-row">
                                <span>🍌 Текущий вопрос:</span>
                                <span class="info-value" id="currentQ">0/10</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <!-- Контейнер игроков с изменяемой высотой -->
                <div class="glass-panel" style="flex:1;">
                    <h2><i class="fas fa-users"></i> УЧАСТНИКИ</h2>
                    <div class="players-container" id="playersContainer">
                        <div id="playersList" class="players-list">
                            <div class="empty-state">
                                <div class="empty-icon">🍌</div>
                                <p>Ожидание игроков...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="glass-panel">
                    <h2><i class="fas fa-list-ol"></i> ВОПРОСЫ</h2>
                    <div class="questions-container">
                        <div id="questionsList" class="questions-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- Режим презентации (без изменений) -->
    <div id="presentationMode">
        <div class="presentation-header">
            <span>🍌 ВОПРОС <span id="presQNum">1</span>/10</span>
            <span class="stats">Ответили: <span id="presAnswered">0</span> | Правильно: <span id="presCorrect">0</span></span>
        </div>
        <div class="presentation-content">
            <div class="presentation-question">
                <h2 id="presQuestionText"></h2>
                <div id="presAnswerBox" class="presentation-answer"></div>
            </div>
        </div>
        <div class="presentation-controls">
            <button class="glass-btn" onclick="showAnswerOnBoard()" id="presShowAnswerBtn">
                <i class="fas fa-check-circle"></i> ПОКАЗАТЬ ОТВЕТ
            </button>
            <button class="glass-btn" onclick="closePresentation()">
                <i class="fas fa-times"></i> ЗАКРЫТЬ
            </button>
        </div>
    </div>

    <script>
        const QUESTIONS = [
            { id: 1, text: "🍌 Какого цвета спелый банан?", options: ["🔴 Красный", "🟢 Зелёный", "🟡 Жёлтый", "🔵 Синий"], correct: 2, points: 1, difficulty: "easy" },
            { id: 2, text: "🍌 Банан - это...", options: ["🍎 Фрукт", "🥕 Овощ", "🍓 Ягода", "🥜 Орех"], correct: 2, points: 1, difficulty: "easy" },
            { id: 3, text: "🍌 Какой формы банан?", options: ["🟠 Круглый", "📏 Прямой", "🌙 Изогнутый", "⬛ Квадратный"], correct: 2, points: 1, difficulty: "easy" },
            { id: 4, text: "🍌 Что растёт на банановой пальме?", options: ["🍌 Бананы", "🥥 Кокосы", "🍍 Ананасы", "🥭 Манго"], correct: 0, points: 1, difficulty: "easy" },
            { id: 5, text: "🍌 Сколько калорий в среднем банане?", options: ["50 ккал", "100 ккал", "150 ккал", "200 ккал"], correct: 1, points: 2, difficulty: "medium" },
            { id: 6, text: "🍌 Какой витамин особенно богат в бананах?", options: ["Витамин C", "Витамин B6", "Витамин D", "Витамин A"], correct: 1, points: 2, difficulty: "medium" },
            { id: 7, text: "🍌 Сколько воды в банане?", options: ["50%", "65%", "75%", "85%"], correct: 2, points: 2, difficulty: "medium" },
            { id: 8, text: "🍌 Какая страна производит больше всего бананов?", options: ["🇧🇷 Бразилия", "🇮🇳 Индия", "🇨🇳 Китай", "🇪🇨 Эквадор"], correct: 1, points: 3, difficulty: "hard" },
            { id: 9, text: "🍌 Бананы растут на...", options: ["🌳 Деревьях", "🌿 Кустах", "🌱 Траве", "🍃 Лианах"], correct: 2, points: 3, difficulty: "hard" },
            { id: 10, text: "🍌 Как называют зелёный банан для варки?", options: ["Платано", "Маранг", "Буру", "Саба"], correct: 0, points: 3, difficulty: "hard" }
        ];

        let gameCode = null;
        let currentQuestionIndex = 0;
        let pollInterval = null;
        let statsInterval = null;
        let answerShown = false;

        // Функция переключения режима
        window.switchMode = function(mode) {
            const controlPanel = document.getElementById('controlPanel');
            const playersContainer = document.getElementById('playersContainer');
            const modeControl = document.getElementById('modeControl');
            const modeStats = document.getElementById('modeStats');
            
            if (mode === 'control') {
                controlPanel.classList.remove('hidden');
                playersContainer.classList.add('control-mode');
                playersContainer.classList.remove('stats-mode');
                modeControl.classList.add('active');
                modeStats.classList.remove('active');
            } else {
                controlPanel.classList.add('hidden');
                playersContainer.classList.add('stats-mode');
                playersContainer.classList.remove('control-mode');
                modeStats.classList.add('active');
                modeControl.classList.remove('active');
            }
        };

        async function createGame() {
            try {
                const code = Math.floor(10000000 + Math.random() * 90000000).toString();
                
                const { error } = await SB
                    .from('games')
                    .insert({ 
                        code: code, 
                        quiz_id: QUIZ_ID,
                        created_at: Date.now(), 
                        status: 'waiting',
                        current_question: 0
                    });
                
                if (error) throw error;
                
                gameCode = code;
                
                document.getElementById('startSection').style.display = 'none';
                document.getElementById('gameControls').classList.remove('hidden');
                document.getElementById('gameCode').innerText = code;
                document.getElementById('currentQ').innerText = '0/' + QUESTIONS.length;
                
                renderQuestions();
                startPolling();
                startStatsPolling();
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        function renderQuestions() {
            const list = document.getElementById('questionsList');
            list.innerHTML = QUESTIONS.map((q, i) => {
                let difficultyColor = q.difficulty === 'easy' ? '#2E8B57' : q.difficulty === 'medium' ? '#FF8C00' : '#DC143C';
                let difficultyText = q.difficulty === 'easy' ? '🍃 ЛЁГКИЙ' : q.difficulty === 'medium' ? '⭐ СРЕДНИЙ' : '🔥 СЛОЖНЫЙ';
                let status = i === currentQuestionIndex ? '▶️' : i < currentQuestionIndex ? '✅' : '⏳';
                
                return `
                    <div class="question-item ${i === currentQuestionIndex ? 'active' : ''}" 
                         onclick="showQuestionOnBoard(${i})">
                        <div class="question-number">${i+1}</div>
                        <div class="question-difficulty" style="color: ${difficultyColor}">${difficultyText}</div>
                        <div class="question-status">${status}</div>
                    </div>
                `;
            }).join('');
        }

        async function showQuestionOnBoard(index) {
            currentQuestionIndex = index;
            answerShown = false;
            renderQuestions();
            
            const q = QUESTIONS[index];
            
            await SB
                .from('games')
                .update({ 
                    status: 'active', 
                    current_question: q.id 
                })
                .eq('code', gameCode);
            
            document.getElementById('presQNum').innerText = index + 1;
            document.getElementById('presQuestionText').innerText = q.text;
            
            document.getElementById('presAnswerBox').classList.remove('show');
            document.getElementById('presAnswerBox').innerHTML = '';
            
            document.getElementById('presentationMode').classList.add('active');
            
            document.getElementById('showAnswerBtn').disabled = false;
            document.getElementById('nextBtn').disabled = true;
            
            await updateStats();
        }

        function showAnswerOnBoard() {
            if (answerShown) return;
            
            const q = QUESTIONS[currentQuestionIndex];
            const correctAnswer = q.options[q.correct];
            
            const answerBox = document.getElementById('presAnswerBox');
            answerBox.innerHTML = `✅ ПРАВИЛЬНЫЙ ОТВЕТ:<br>${correctAnswer}`;
            answerBox.classList.add('show');
            
            document.getElementById('showAnswerBtn').disabled = true;
            document.getElementById('nextBtn').disabled = false;
            
            answerShown = true;
        }

        function nextQuestion() {
            if (currentQuestionIndex + 1 < QUESTIONS.length) {
                showQuestionOnBoard(currentQuestionIndex + 1);
            } else {
                alert('🎉 Все вопросы пройдены!');
                closePresentation();
            }
        }

        async function finishGame() {
            if (!gameCode) return;
            
            await SB
                .from('games')
                .update({ status: 'finished' })
                .eq('code', gameCode);
            
            alert('✅ Игра завершена! Ученики увидят результаты.');
            resetGame();
        }

        function closePresentation() {
            document.getElementById('presentationMode').classList.remove('active');
        }

        async function updatePlayers() {
            if (!gameCode) return;
            
            try {
                const { data, error } = await SB
                    .from('players')
                    .select('*')
                    .eq('game_code', gameCode);
                
                if (error) throw error;
                
                document.getElementById('totalPlayers').innerText = data.length;
                
                const list = document.getElementById('playersList');
                if (data.length === 0) {
                    list.innerHTML = '<div class="empty-state">🍌 Ожидание игроков...</div>';
                } else {
                    list.innerHTML = data.map(p => `
                        <div class="player-card ${p.answered ? 'answered' : ''}">
                            <div class="player-avatar">${p.name[0]}</div>
                            <div class="player-name">${p.name}</div>
                            <div style="font-size: 1.2rem; font-weight: bold;">🍌 ${p.score || 0}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Ошибка обновления игроков:', e);
            }
        }

        async function updateStats() {
            if (!gameCode || currentQuestionIndex < 0) return;
            
            try {
                const currentQuestionId = QUESTIONS[currentQuestionIndex].id;
                
                const { data: answers, error } = await SB
                    .from('answers')
                    .select('*')
                    .eq('game_code', gameCode)
                    .eq('question_id', currentQuestionId);
                
                if (error) throw error;
                
                const answeredCount = answers?.length || 0;
                const correctCount = answers?.filter(a => a.is_correct).length || 0;
                const wrongCount = answeredCount - correctCount;
                
                const { data: players } = await SB
                    .from('players')
                    .select('*')
                    .eq('game_code', gameCode);
                
                const totalPlayers = players?.length || 0;
                
                document.getElementById('answeredCount').innerText = answeredCount;
                document.getElementById('correctCount').innerText = correctCount;
                document.getElementById('wrongCount').innerText = wrongCount;
                
                if (document.getElementById('presentationMode').classList.contains('active')) {
                    document.getElementById('presAnswered').innerText = answeredCount;
                    document.getElementById('presCorrect').innerText = correctCount;
                }
            } catch (e) {
                console.error('Ошибка обновления статистики:', e);
            }
        }

        function startPolling() {
            updatePlayers();
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(updatePlayers, 2000);
        }

        function startStatsPolling() {
            updateStats();
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(updateStats, 2000);
        }

        function resetGame() {
            if (pollInterval) clearInterval(pollInterval);
            if (statsInterval) clearInterval(statsInterval);
            gameCode = null;
            currentQuestionIndex = 0;
            answerShown = false;
            document.getElementById('startSection').style.display = 'block';
            document.getElementById('gameControls').classList.add('hidden');
            document.getElementById('gameCode').innerText = '----';
            document.getElementById('playersList').innerHTML = '<div class="empty-state">🍌 Ожидание игроков...</div>';
            document.getElementById('answeredCount').innerText = '0';
            document.getElementById('correctCount').innerText = '0';
            document.getElementById('wrongCount').innerText = '0';
            renderQuestions();
            closePresentation();
        }
    </script>
</body>
</html>
