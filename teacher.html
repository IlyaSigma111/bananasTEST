<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>🍌 Учитель - Банановая викторина</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <!-- ═══════════════════════════════════════════════════════════════════════
         БАНАНОВЫЙ ГЛАССМОРФИЗМ - ПРИНЦИПЫ:
         
         1. Все панели полупрозрачные (backdrop-filter: blur)
         2. Границы коричневые, мягкие
         3. Активные элементы подсвечиваются жёлтым
         4. Формы скруглённые (как банан)
         5. Тени золотистые
         
         Для новой викторины нужно:
         - Изменить :root цвета
         - Заменить массив QUESTIONS
         - Изменить QUIZ_ID в config.js
         ═══════════════════════════════════════════════════════════════════════ -->
    <style>
        /* ═══════════════════════════════════════════════════════════════════
           БАНАНОВАЯ ЦВЕТОВАЯ СХЕМА
           ═══════════════════════════════════════════════════════════════════ */
        :root {
            --banana-yellow: #FFE135;
            --banana-gold: #FFD700;
            --banana-dark: #8B4513;
            --banana-cream: #FFF9C4;
            --banana-green: #6B8E23;
            
            --text-light: #FFF9C4;
            --text-dark: #5A3E1B;
            
            --bg-gradient-start: #FFF9C4;
            --bg-gradient-end: #FFD700;
            
            /* Параметры глассморфизма */
            --glass-bg: rgba(255, 249, 196, 0.15);
            --glass-bg-darker: rgba(139, 69, 19, 0.1);
            --glass-border: rgba(139, 69, 19, 0.3);
            --glass-blur: 10px;
            --glass-shadow: 0 8px 32px 0 rgba(255, 215, 0, 0.3);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            overflow: hidden;
            
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        #mainInterface {
            display: flex;
            flex-direction: column;
            height: 100vh;
            width: 100vw;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           ШАПКА
           ═══════════════════════════════════════════════════════════════════ */
        .teacher-header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
            
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-bottom: 2px solid var(--glass-border);
        }
        
        .header-left h1 {
            font-size: 1.5rem;
            color: var(--text-dark);
        }
        
        .game-code-box {
            padding: 10px 20px;
            display: flex;
            align-items: center;
            gap: 15px;
            
            background: var(--glass-bg-darker);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 30px;
        }
        
        .code-display {
            font-size: 1.8rem;
            font-weight: 900;
            color: var(--banana-dark);
            letter-spacing: 2px;
            min-width: 150px;
            text-align: center;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           КНОПКИ
           ═══════════════════════════════════════════════════════════════════ */
        .glass-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 20px;
            font-size: 0.9rem;
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            cursor: pointer;
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            color: var(--text-dark);
            transition: all 0.3s;
        }
        
        .glass-btn:hover {
            border-color: var(--banana-dark);
            background: var(--banana-yellow);
            color: var(--text-dark);
            box-shadow: 0 0 30px var(--banana-yellow);
            transform: translateY(-2px);
        }
        
        .glass-btn:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            pointer-events: none;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           ОСНОВНОЙ КОНТЕНТ
           ═══════════════════════════════════════════════════════════════════ */
        .main-content {
            display: flex;
            flex: 1;
            padding: 20px;
            gap: 20px;
            overflow: hidden;
        }
        
        .left-column, .right-column {
            width: 50%;
            display: flex;
            flex-direction: column;
            gap: 20px;
            overflow: hidden;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           ПАНЕЛИ
           ═══════════════════════════════════════════════════════════════════ */
        .glass-panel {
            padding: 20px;
            border-radius: 30px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
        }
        
        .glass-panel h2 {
            color: var(--banana-dark);
            margin-bottom: 15px;
            font-size: 1.3rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        
        .control-buttons {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }
        
        .control-buttons .glass-btn {
            padding: 15px;
            font-size: 1rem;
            justify-content: flex-start;
        }
        
        .info-block {
            padding: 15px;
            margin-top: 15px;
            border-radius: 20px;
            
            background: var(--glass-bg-darker);
            border: 1px solid var(--glass-border);
        }
        
        .info-row {
            display: flex;
            justify-content: space-between;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        
        .info-value {
            color: var(--banana-dark);
            font-weight: 700;
            font-size: 1.2rem;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           СТАТИСТИКА
           ═══════════════════════════════════════════════════════════════════ */
        .stats-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
            margin: 10px 0;
        }
        
        .stat-card {
            padding: 15px;
            text-align: center;
            border-radius: 20px;
            
            background: var(--glass-bg-darker);
            border: 1px solid var(--glass-border);
            color: var(--text-dark);
        }
        
        .stat-value {
            font-size: 2rem;
            font-weight: bold;
            color: var(--banana-dark);
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           СПИСОК ИГРОКОВ
           ═══════════════════════════════════════════════════════════════════ */
        .players-container {
            flex: 1;
            overflow-y: auto;
            padding-right: 5px;
        }
        
        .players-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(160px, 1fr));
            gap: 12px;
        }
        
        .player-card {
            padding: 15px;
            text-align: center;
            border-radius: 30px;
            transition: 0.3s;
            
            background: var(--glass-bg-darker);
            border: 2px solid var(--glass-border);
            color: var(--text-dark);
        }
        
        .player-card.answered {
            border-color: var(--banana-gold);
            box-shadow: 0 0 15px var(--banana-gold);
        }
        
        .player-avatar {
            width: 50px;
            height: 50px;
            background: var(--banana-yellow);
            color: var(--banana-dark);
            border-radius: 50%;
            margin: 0 auto 10px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 900;
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           СПИСОК ВОПРОСОВ
           ═══════════════════════════════════════════════════════════════════ */
        .questions-list {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 10px;
        }
        
        .question-item {
            padding: 15px 5px;
            text-align: center;
            border-radius: 20px;
            cursor: pointer;
            
            background: var(--glass-bg-darker);
            border: 2px solid var(--glass-border);
            color: var(--text-dark);
        }
        
        .question-item:hover {
            border-color: var(--banana-yellow);
            box-shadow: 0 0 15px var(--banana-yellow);
        }
        
        .question-item.active {
            border-color: var(--banana-gold);
            background: var(--glass-bg);
        }
        
        .question-number {
            font-size: 1.3rem;
            font-weight: bold;
            margin-bottom: 5px;
        }
        
        .empty-state {
            text-align: center;
            padding: 30px 20px;
            color: var(--text-dark);
            opacity: 0.5;
        }
        
        .hidden { display: none; }
        
        /* ═══════════════════════════════════════════════════════════════════
           РЕЖИМ ПРЕЗЕНТАЦИИ
           ═══════════════════════════════════════════════════════════════════ */
        #presentationMode {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: 1000;
            display: none;
            flex-direction: column;
            
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        #presentationMode.active {
            display: flex;
        }
        
        .presentation-header {
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border-bottom: 2px solid var(--glass-border);
            color: var(--text-dark);
        }
        
        .presentation-content {
            flex: 1;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }
        
        .presentation-question {
            max-width: 900px;
            width: 100%;
            padding: 60px;
            text-align: center;
            
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 2px solid var(--glass-border);
            border-radius: 60px;
            box-shadow: var(--glass-shadow);
        }
        
        .presentation-question h2 {
            font-size: 4rem;
            line-height: 1.4;
            margin-bottom: 40px;
            color: var(--banana-dark);
        }
        
        .stats-box {
            display: inline-block;
            padding: 20px 40px;
            margin-top: 30px;
            font-size: 2rem;
            
            background: var(--glass-bg-darker);
            border: 1px solid var(--glass-border);
            border-radius: 40px;
            color: var(--text-dark);
        }
        
        .stats-box span {
            color: var(--banana-dark);
            font-size: 2.5rem;
            font-weight: bold;
            margin: 0 15px;
        }
        
        .presentation-controls {
            padding: 20px;
            text-align: center;
            border-top: 2px solid var(--glass-border);
        }
    </style>
</head>
<body>
    <div id="mainInterface">
        <header class="teacher-header">
            <div class="header-left">
                <h1>🍌 ПАНЕЛЬ УЧИТЕЛЯ</h1>
            </div>
            <div class="game-code-box">
                <span>🍌 КОД:</span>
                <div id="gameCode" class="code-display">----</div>
                <a href="index.html" class="glass-btn">
                    <i class="fas fa-home"></i> Главная
                </a>
            </div>
        </header>

        <div class="main-content">
            <div class="left-column">
                <div class="glass-panel">
                    <h2><i class="fas fa-gamepad"></i> УПРАВЛЕНИЕ</h2>
                    
                    <div id="startSection">
                        <button onclick="createGame()" class="glass-btn control-buttons">
                            <i class="fas fa-plus-circle"></i> 🍌 СОЗДАТЬ ИГРУ
                        </button>
                    </div>

                    <div id="gameControls" class="hidden">
                        <div class="control-buttons">
                            <button onclick="showQuestionOnBoard(0)" id="showFirstBtn" class="glass-btn">
                                <i class="fas fa-play"></i> ПОКАЗАТЬ ВОПРОС 1
                            </button>
                            <button onclick="showAnswerOnBoard()" id="showAnswerBtn" class="glass-btn" disabled>
                                <i class="fas fa-check-circle"></i> ПОКАЗАТЬ ОТВЕТ
                            </button>
                            <button onclick="nextQuestion()" id="nextBtn" class="glass-btn" disabled>
                                <i class="fas fa-forward"></i> СЛЕДУЮЩИЙ
                            </button>
                            <button onclick="finishGame()" class="glass-btn">
                                <i class="fas fa-flag-checkered"></i> ЗАВЕРШИТЬ ИГРУ
                            </button>
                            <button onclick="resetGame()" class="glass-btn">
                                <i class="fas fa-redo"></i> СБРОСИТЬ
                            </button>
                        </div>
                        
                        <div class="stats-grid">
                            <div class="stat-card">
                                <div class="stat-value" id="totalPlayers">0</div>
                                <div>🍌 Игроков</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="answeredCount">0</div>
                                <div>✅ Ответили</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="correctCount">0</div>
                                <div>⭐ Правильно</div>
                            </div>
                            <div class="stat-card">
                                <div class="stat-value" id="wrongCount">0</div>
                                <div>❌ Неправильно</div>
                            </div>
                        </div>
                        
                        <div class="info-block">
                            <div class="info-row">
                                <span>🍌 Текущий вопрос:</span>
                                <span class="info-value" id="currentQ">0/10</span>
                            </div>
                        </div>
                    </div>
                </div>
                
                <div class="glass-panel" style="flex:1;">
                    <h2><i class="fas fa-users"></i> УЧАСТНИКИ</h2>
                    <div class="players-container">
                        <div id="playersList" class="players-list">
                            <div class="empty-state">
                                <div class="empty-icon">🍌</div>
                                <p>Ожидание игроков...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="right-column">
                <div class="glass-panel">
                    <h2><i class="fas fa-list-ol"></i> ВОПРОСЫ</h2>
                    <div class="questions-container">
                        <div id="questionsList" class="questions-list"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <!-- ═══════════════════════════════════════════════════════════════════════
         РЕЖИМ ПРЕЗЕНТАЦИИ
         ═══════════════════════════════════════════════════════════════════════ -->
    <div id="presentationMode">
        <div class="presentation-header">
            <span>🍌 ВОПРОС <span id="presQNum">1</span>/10</span>
            <span>Ответили: <span id="presAnswered">0</span> | Правильно: <span id="presCorrect">0</span></span>
        </div>
        <div class="presentation-content">
            <div class="presentation-question">
                <h2 id="presQuestionText"></h2>
                <div class="stats-box">
                    <span id="presAnsweredBig">0</span> из <span id="presTotalBig">0</span> ответили<br>
                    <span id="presCorrectBig">0</span> правильно
                </div>
            </div>
        </div>
        <div class="presentation-controls">
            <button class="glass-btn" onclick="closePresentation()">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // 10 ВОПРОСОВ О БАНАНАХ
        // ═══════════════════════════════════════════════════════════════════════
        const QUESTIONS = [
            { id: 1, text: "🍌 Какого цвета спелый банан?", options: ["Красный", "Зелёный", "Жёлтый", "Синий"], correct: 2, points: 1, difficulty: "easy" },
            { id: 2, text: "🍌 Банан - это...", options: ["Фрукт", "Овощ", "Ягода", "Орех"], correct: 2, points: 2, difficulty: "medium" },
            { id: 3, text: "🍌 Сколько калорий в среднем банане?", options: ["50", "100", "150", "200"], correct: 1, points: 2, difficulty: "medium" },
            { id: 4, text: "🍌 Какая страна производит больше всего бананов?", options: ["Бразилия", "Индия", "Китай", "Эквадор"], correct: 1, points: 3, difficulty: "hard" },
            { id: 5, text: "🍌 Бананы растут на...", options: ["Деревьях", "Кустах", "Траве", "Лианах"], correct: 2, points: 3, difficulty: "hard" },
            { id: 6, text: "🍌 Какой витамин особенно богат в бананах?", options: ["Витамин C", "Витамин B6", "Витамин D", "Витамин A"], correct: 1, points: 1, difficulty: "easy" },
            { id: 7, text: "🍌 Сколько воды в банане?", options: ["50%", "65%", "75%", "85%"], correct: 2, points: 2, difficulty: "medium" },
            { id: 8, text: "🍌 Как называют зелёный банан для варки?", options: ["Платано", "Маранг", "Буру", "Саба"], correct: 0, points: 3, difficulty: "hard" },
            { id: 9, text: "🍌 Когда изобрели банановый сплит?", options: ["1904", "1920", "1935", "1948"], correct: 0, points: 3, difficulty: "hard" },
            { id: 10, text: "🍌 Сколько бананов съедает американец в год?", options: ["10 кг", "12 кг", "15 кг", "18 кг"], correct: 1, points: 2, difficulty: "medium" }
        ];

        let gameCode = null;
        let currentQuestionIndex = 0;
        let pollInterval = null;
        let statsInterval = null;

        async function createGame() {
            try {
                const code = Math.floor(10000000 + Math.random() * 90000000).toString();
                
                const { error } = await SB
                    .from('games')
                    .insert({ 
                        code: code, 
                        quiz_id: QUIZ_ID,
                        created_at: Date.now(), 
                        status: 'waiting',
                        current_question: 0
                    });
                
                if (error) throw error;
                
                gameCode = code;
                
                document.getElementById('startSection').style.display = 'none';
                document.getElementById('gameControls').classList.remove('hidden');
                document.getElementById('gameCode').innerText = code;
                document.getElementById('currentQ').innerText = '0/' + QUESTIONS.length;
                
                renderQuestions();
                startPolling();
                startStatsPolling();
                
            } catch (e) {
                alert('Ошибка: ' + e.message);
            }
        }

        function renderQuestions() {
            const list = document.getElementById('questionsList');
            list.innerHTML = QUESTIONS.map((q, i) => {
                let difficultyColor = q.difficulty === 'easy' ? '#2E8B57' : q.difficulty === 'medium' ? '#FFA500' : '#DC143C';
                let difficultyText = q.difficulty.toUpperCase();
                let status = i === currentQuestionIndex ? '🍌' : i < currentQuestionIndex ? '✅' : '⏳';
                
                return `
                    <div class="question-item ${i === currentQuestionIndex ? 'active' : ''}" 
                         onclick="showQuestionOnBoard(${i})">
                        <div class="question-number">${i+1}</div>
                        <div class="question-difficulty" style="color: ${difficultyColor}">${difficultyText}</div>
                        <div class="question-status">${status}</div>
                    </div>
                `;
            }).join('');
        }

        async function showQuestionOnBoard(index) {
            currentQuestionIndex = index;
            renderQuestions();
            
            const q = QUESTIONS[index];
            
            await SB
                .from('games')
                .update({ 
                    status: 'active', 
                    current_question: q.id 
                })
                .eq('code', gameCode);
            
            document.getElementById('presQNum').innerText = index + 1;
            document.getElementById('presQuestionText').innerText = q.text;
            
            document.getElementById('presentationMode').classList.add('active');
            document.getElementById('showAnswerBtn').disabled = false;
            document.getElementById('nextBtn').disabled = true;
            
            await updateStats();
        }

        function showAnswerOnBoard() {
            document.getElementById('showAnswerBtn').disabled = true;
            document.getElementById('nextBtn').disabled = false;
        }

        function nextQuestion() {
            if (currentQuestionIndex + 1 < QUESTIONS.length) {
                showQuestionOnBoard(currentQuestionIndex + 1);
            } else {
                alert('🎉 Все вопросы пройдены!');
                closePresentation();
            }
        }

        async function finishGame() {
            if (!gameCode) return;
            
            await SB
                .from('games')
                .update({ status: 'finished' })
                .eq('code', gameCode);
            
            alert('✅ Игра завершена! Ученики увидят результаты.');
            resetGame();
        }

        function closePresentation() {
            document.getElementById('presentationMode').classList.remove('active');
        }

        async function updatePlayers() {
            if (!gameCode) return;
            
            try {
                const { data, error } = await SB
                    .from('players')
                    .select('*')
                    .eq('game_code', gameCode);
                
                if (error) throw error;
                
                document.getElementById('totalPlayers').innerText = data.length;
                
                const list = document.getElementById('playersList');
                if (data.length === 0) {
                    list.innerHTML = '<div class="empty-state">🍌 Ожидание игроков...</div>';
                } else {
                    list.innerHTML = data.map(p => `
                        <div class="player-card ${p.answered ? 'answered' : ''}">
                            <div class="player-avatar">${p.name[0]}</div>
                            <div class="player-name">${p.name}</div>
                            <div>🍌 ${p.score || 0}</div>
                        </div>
                    `).join('');
                }
            } catch (e) {
                console.error('Ошибка обновления игроков:', e);
            }
        }

        async function updateStats() {
            if (!gameCode || currentQuestionIndex < 0) return;
            
            try {
                const currentQuestionId = QUESTIONS[currentQuestionIndex].id;
                
                const { data: answers, error } = await SB
                    .from('answers')
                    .select('*')
                    .eq('game_code', gameCode)
                    .eq('question_id', currentQuestionId);
                
                if (error) throw error;
                
                const answeredCount = answers?.length || 0;
                const correctCount = answers?.filter(a => a.is_correct).length || 0;
                const wrongCount = answeredCount - correctCount;
                
                const { data: players } = await SB
                    .from('players')
                    .select('*')
                    .eq('game_code', gameCode);
                
                const totalPlayers = players?.length || 0;
                
                document.getElementById('answeredCount').innerText = answeredCount;
                document.getElementById('correctCount').innerText = correctCount;
                document.getElementById('wrongCount').innerText = wrongCount;
                
                if (document.getElementById('presentationMode').classList.contains('active')) {
                    document.getElementById('presAnswered').innerText = answeredCount;
                    document.getElementById('presCorrect').innerText = correctCount;
                    document.getElementById('presAnsweredBig').innerText = answeredCount;
                    document.getElementById('presCorrectBig').innerText = correctCount;
                    document.getElementById('presTotalBig').innerText = totalPlayers;
                }
            } catch (e) {
                console.error('Ошибка обновления статистики:', e);
            }
        }

        function startPolling() {
            updatePlayers();
            if (pollInterval) clearInterval(pollInterval);
            pollInterval = setInterval(updatePlayers, 2000);
        }

        function startStatsPolling() {
            updateStats();
            if (statsInterval) clearInterval(statsInterval);
            statsInterval = setInterval(updateStats, 2000);
        }

        function resetGame() {
            if (pollInterval) clearInterval(pollInterval);
            if (statsInterval) clearInterval(statsInterval);
            gameCode = null;
            currentQuestionIndex = 0;
            document.getElementById('startSection').style.display = 'block';
            document.getElementById('gameControls').classList.add('hidden');
            document.getElementById('gameCode').innerText = '----';
            document.getElementById('playersList').innerHTML = '<div class="empty-state">🍌 Ожидание игроков...</div>';
            document.getElementById('answeredCount').innerText = '0';
            document.getElementById('correctCount').innerText = '0';
            document.getElementById('wrongCount').innerText = '0';
            renderQuestions();
            closePresentation();
        }
    </script>
</body>
</html>
