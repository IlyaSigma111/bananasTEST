<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Ученик - Викторина</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="config.js"></script>
    
    <!-- ═══════════════════════════════════════════════════════════════════════
         ГЛАССМОРФИЗМ + ТЕМАТИЧЕСКИЙ ДИЗАЙН
         :root - менять цвета под тему викторины
         ═══════════════════════════════════════════════════════════════════════ -->
    <style>
        /* ═══════════════════════════════════════════════════════════════════
           ЦВЕТА ТЕМЫ - МЕНЯТЬ ПОД КОНКРЕТНУЮ ВИКТОРИНУ
           ═══════════════════════════════════════════════════════════════════ */
        :root {
            /* Основные цвета темы */
            --primary-color: #0f0;           /* Зелёный (для кибер-темы) */
            --secondary-color: #ff00ff;       /* Розовый (акцент) */
            --text-color: #fff;                /* Цвет текста */
            --text-dark: #000;                 /* Тёмный текст для контраста */
            
            /* Градиент фона */
            --bg-gradient-start: #0a0a0a;      /* Тёмно-серый */
            --bg-gradient-end: #1a1a1a;         /* Чуть светлее */
            
            /* Параметры глассморфизма */
            --glass-bg: rgba(255, 255, 255, 0.1);
            --glass-bg-darker: rgba(0, 0, 0, 0.3);
            --glass-border: rgba(255, 255, 255, 0.2);
            --glass-blur: 10px;
            --glass-shadow: 0 8px 32px 0 rgba(31, 38, 135, 0.37);
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            
            /* Градиентный фон */
            background: linear-gradient(135deg, 
                var(--bg-gradient-start), 
                var(--bg-gradient-end));
        }
        
        .container {
            width: 100%;
            max-width: 500px;
        }
        
        .glass-card {
            padding: 30px;
            
            /* Глассморфизм */
            background: var(--glass-bg);
            backdrop-filter: blur(var(--glass-blur));
            -webkit-backdrop-filter: blur(var(--glass-blur));
            border: 1px solid var(--glass-border);
            border-radius: 30px;
            box-shadow: var(--glass-shadow);
            
            /* Анимация появления */
            animation: fadeIn 0.5s ease-out;
        }
        
        .screen { display: none; }
        .screen.active { display: block; }
        
        h1, h2 {
            text-align: center;
            margin-bottom: 30px;
            color: var(--primary-color);
        }
        
        .logo {
            font-size: 60px;
            text-align: center;
            margin-bottom: 20px;
            filter: drop-shadow(0 0 20px var(--primary-color));
        }
        
        input {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            font-size: 1.2rem;
            border-radius: 16px;
            
            background: var(--glass-bg-darker);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: inherit;
        }
        
        input:focus {
            outline: none;
            border-color: var(--primary-color);
            box-shadow: 0 0 30px var(--primary-color);
        }
        
        .btn {
            width: 100%;
            padding: 18px;
            margin: 10px 0;
            font-size: 1.2rem;
            border-radius: 16px;
            cursor: pointer;
            transition: all 0.3s;
            
            background: var(--glass-bg);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
            font-family: inherit;
            font-weight: bold;
        }
        
        .btn:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 30px var(--primary-color);
            transform: translateY(-2px);
        }
        
        .info-box {
            padding: 20px;
            margin: 20px 0;
            border-radius: 16px;
            
            background: var(--glass-bg-darker);
            border: 1px solid var(--glass-border);
        }
        
        .info-item {
            display: flex;
            justify-content: space-between;
            padding: 10px 0;
            border-bottom: 1px solid var(--glass-border);
        }
        
        .info-item:last-child {
            border-bottom: none;
        }
        
        .question-header {
            padding: 15px;
            margin-bottom: 25px;
            border-radius: 16px;
            display: flex;
            justify-content: space-between;
            
            background: var(--glass-bg-darker);
            border: 1px solid var(--glass-border);
        }
        
        .question-text {
            font-size: 1.5rem;
            margin: 30px 0;
            text-align: center;
            color: var(--text-color);
        }
        
        .options {
            display: flex;
            flex-direction: column;
            gap: 15px;
            margin: 30px 0;
        }
        
        .option {
            padding: 18px;
            border-radius: 16px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 20px;
            transition: 0.3s;
            
            background: var(--glass-bg-darker);
            border: 2px solid var(--glass-border);
            color: var(--text-color);
        }
        
        .option:hover {
            border-color: var(--primary-color);
            box-shadow: 0 0 20px var(--primary-color);
        }
        
        .option.selected {
            border-color: var(--primary-color);
            background: var(--glass-bg);
        }
        
        .option-letter {
            width: 40px;
            height: 40px;
            background: var(--primary-color);
            color: var(--text-dark);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 900;
            font-size: 1.2rem;
        }
        
        .status {
            text-align: center;
            padding: 20px;
            border-radius: 16px;
        }
        
        .status.correct { 
            background: rgba(0, 255, 0, 0.2);
            border: 1px solid var(--primary-color);
            color: var(--primary-color);
        }
        
        .status.wrong { 
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
            color: red;
        }
        
        .status.waiting {
            background: var(--glass-bg-darker);
            border: 1px solid var(--glass-border);
            color: var(--text-color);
        }
        
        .error {
            padding: 12px;
            margin: 10px 0;
            border-radius: 12px;
            text-align: center;
            
            background: rgba(255, 0, 0, 0.2);
            border: 1px solid red;
            color: red;
        }
        
        .loader {
            width: 50px;
            height: 50px;
            margin: 20px auto;
            border: 3px solid var(--glass-border);
            border-top: 3px solid var(--primary-color);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .hidden { display: none; }
        
        @keyframes fadeIn {
            from {
                opacity: 0;
                transform: translateY(20px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }
        
        /* ═══════════════════════════════════════════════════════════════════
           ЛИДЕРБОРД
           ═══════════════════════════════════════════════════════════════════ */
        .leaderboard {
            margin: 20px 0;
        }
        
        .podium {
            display: flex;
            justify-content: center;
            align-items: flex-end;
            gap: 15px;
            margin: 30px 0;
            padding: 20px 0;
        }
        
        .podium-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            width: 100px;
        }
        
        .podium-1 { order: 2; }
        .podium-2 { order: 1; }
        .podium-3 { order: 3; }
        
        .podium-place {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 2rem;
            font-weight: bold;
            margin-bottom: 10px;
        }
        
        .podium-1 .podium-place {
            background: gold;
            color: var(--text-dark);
            box-shadow: 0 0 30px gold;
        }
        
        .podium-2 .podium-place {
            background: silver;
            color: var(--text-dark);
            box-shadow: 0 0 30px silver;
        }
        
        .podium-3 .podium-place {
            background: #cd7f32;
            color: var(--text-dark);
            box-shadow: 0 0 30px #cd7f32;
        }
        
        .podium-name {
            font-size: 1.1rem;
            font-weight: bold;
            text-align: center;
            margin-bottom: 5px;
            color: var(--text-color);
        }
        
        .podium-score {
            font-size: 1.3rem;
            color: var(--primary-color);
        }
        
        .players-table {
            margin-top: 30px;
        }
        
        .player-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 12px 15px;
            border-bottom: 1px solid var(--glass-border);
            color: var(--text-color);
        }
        
        .player-rank {
            font-weight: bold;
            margin-right: 15px;
        }
        
        .player-name {
            font-size: 1.1rem;
            flex: 1;
        }
        
        .player-score {
            font-size: 1.2rem;
            color: var(--primary-color);
            font-weight: bold;
        }
        
        .top-3-divider {
            margin: 20px 0;
            text-align: center;
            color: var(--text-color);
            opacity: 0.5;
        }
        
        .celebration {
            text-align: center;
            margin: 20px 0;
            font-size: 3rem;
            filter: drop-shadow(0 0 20px var(--primary-color));
            animation: bounce 1s infinite;
        }
        
        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-20px); }
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- ЭКРАН ВХОДА -->
        <div id="joinScreen" class="screen active">
            <div class="glass-card">
                <div class="logo">🎯</div>
                <h1>ВИКТОРИНА</h1>
                <div id="errorContainer"></div>
                <input type="text" id="playerName" placeholder="Твоё имя">
                <input type="text" id="gameCode" placeholder="Код игры">
                <button id="joinButton" class="btn">🔌 ПОДКЛЮЧИТЬСЯ</button>
            </div>
        </div>

        <!-- ЭКРАН ОЖИДАНИЯ -->
        <div id="waitingScreen" class="screen">
            <div class="glass-card">
                <div class="logo">⏳</div>
                <h2>ОЖИДАНИЕ...</h2>
                <div class="loader"></div>
                <div class="info-box">
                    <div class="info-item">
                        <span>Участник:</span>
                        <strong id="displayName">-</strong>
                    </div>
                    <div class="info-item">
                        <span>Код:</span>
                        <strong id="displayCode">-</strong>
                    </div>
                    <div class="info-item">
                        <span>Очки:</span>
                        <strong id="displayScore">0</strong>
                    </div>
                </div>
                <button onclick="leaveGame()" class="btn">🚪 ВЫЙТИ</button>
            </div>
        </div>

        <!-- ЭКРАН ВОПРОСА -->
        <div id="questionScreen" class="screen">
            <div class="glass-card">
                <div class="question-header">
                    <span>ВОПРОС</span>
                    <span id="questionCounter">1/5</span>
                </div>
                <div class="question-text" id="questionText"></div>
                <div class="options" id="optionsContainer"></div>
                <div class="status waiting" id="answerStatus">⏳ Выбери ответ</div>
            </div>
        </div>

        <!-- ЭКРАН ЛИДЕРБОРДА -->
        <div id="leaderboardScreen" class="screen">
            <div class="glass-card">
                <div class="celebration">🏆</div>
                <h2>РЕЗУЛЬТАТЫ</h2>
                <div class="leaderboard" id="leaderboard"></div>
                <button onclick="playAgain()" class="btn">🔄 ИГРАТЬ СНОВА</button>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════════════
        // МАССИВ ВОПРОСОВ - ЗДЕСЬ МЕНЯТЬ ВОПРОСЫ ДЛЯ НОВОЙ ВИКТОРИНЫ
        // ═══════════════════════════════════════════════════════════════════════
        const QUESTIONS = [
            { id: 1, text: "Вопрос 1?", options: ["Вариант А", "Вариант Б", "Вариант В", "Вариант Г"], correct: 0, points: 1 },
            { id: 2, text: "Вопрос 2?", options: ["Вариант А", "Вариант Б", "Вариант В", "Вариант Г"], correct: 1, points: 1 },
            { id: 3, text: "Вопрос 3?", options: ["Вариант А", "Вариант Б", "Вариант В", "Вариант Г"], correct: 2, points: 1 },
            { id: 4, text: "Вопрос 4?", options: ["Вариант А", "Вариант Б", "Вариант В", "Вариант Г"], correct: 3, points: 1 },
            { id: 5, text: "Вопрос 5?", options: ["Вариант А", "Вариант Б", "Вариант В", "Вариант Г"], correct: 0, points: 1 }
        ];

        let gameCode = null;
        let playerName = null;
        let currentQuestion = null;
        let hasAnswered = false;
        let pollInterval = null;
        let playerScore = 0;
        let currentQuestionId = null;
        let isQuestionScreenActive = false;
        let gameCompleted = false;

        const joinButton = document.getElementById('joinButton');
        const errorContainer = document.getElementById('errorContainer');
        const playerNameInput = document.getElementById('playerName');
        const gameCodeInput = document.getElementById('gameCode');

        function showError(msg) {
            errorContainer.innerHTML = `<div class="error">${msg}</div>`;
            setTimeout(() => errorContainer.innerHTML = '', 3000);
        }

        function switchScreen(screen) {
            ['join', 'waiting', 'question', 'leaderboard'].forEach(s => {
                document.getElementById(s + 'Screen').classList.remove('active');
            });
            document.getElementById(screen + 'Screen').classList.add('active');
            
            if (screen === 'question') {
                isQuestionScreenActive = true;
            } else {
                isQuestionScreenActive = false;
            }
            
            if (screen === 'leaderboard') {
                loadLeaderboard();
            }
        }

        async function loadLeaderboard() {
            if (!gameCode) return;
            
            try {
                const { data: players, error } = await SB
                    .from('players')
                    .select('name, score')
                    .eq('game_code', gameCode)
                    .order('score', { ascending: false });
                
                if (error) throw error;
                
                const leaderboardDiv = document.getElementById('leaderboard');
                
                if (!players || players.length === 0) {
                    leaderboardDiv.innerHTML = '<p>Нет участников</p>';
                    return;
                }
                
                const top3 = players.slice(0, 3);
                const others = players.slice(3);
                
                let html = '';
                
                if (top3.length > 0) {
                    html += '<div class="podium">';
                    
                    const podiumOrder = [1, 0, 2];
                    
                    podiumOrder.forEach((idx, position) => {
                        if (idx < top3.length) {
                            const player = top3[idx];
                            const place = idx + 1;
                            const placeClass = place === 1 ? 'podium-1' : place === 2 ? 'podium-2' : 'podium-3';
                            
                            html += `
                                <div class="podium-item ${placeClass}">
                                    <div class="podium-place">${place}</div>
                                    <div class="podium-name">${player.name}</div>
                                    <div class="podium-score">${player.score}</div>
                                </div>
                            `;
                        }
                    });
                    
                    html += '</div>';
                }
                
                if (others.length > 0) {
                    html += '<div class="top-3-divider">──────────</div>';
                    html += '<div class="players-table">';
                    
                    others.forEach((player, index) => {
                        const rank = index + 4;
                        html += `
                            <div class="player-row">
                                <span class="player-rank">#${rank}</span>
                                <span class="player-name">${player.name}</span>
                                <span class="player-score">${player.score}</span>
                            </div>
                        `;
                    });
                    
                    html += '</div>';
                }
                
                leaderboardDiv.innerHTML = html;
                
            } catch (e) {
                console.error('Ошибка загрузки лидерборда:', e);
            }
        }

        joinButton.addEventListener('click', async () => {
            const name = playerNameInput.value.trim();
            const code = gameCodeInput.value.trim();
            
            if (!name || !code) {
                showError("Введите имя и код");
                return;
            }
            
            try {
                const { error } = await SB
                    .from('players')
                    .insert({
                        game_code: code,
                        name: name,
                        score: 0,
                        answered: false,
                        joined_at: Date.now()
                    });
                
                if (error) throw error;
                
                gameCode = code;
                playerName = name;
                
                document.getElementById('displayName').innerText = name;
                document.getElementById('displayCode').innerText = code;
                switchScreen('waiting');
                
                if (pollInterval) clearInterval(pollInterval);
                pollInterval = setInterval(checkGameStatus, 2000);
                
            } catch (e) {
                showError(e.message);
            }
        });

        async function checkGameStatus() {
            if (!gameCode) return;
            
            try {
                const { data, error } = await SB
                    .from('games')
                    .select('status, current_question')
                    .eq('code', gameCode)
                    .single();
                
                if (error) {
                    console.log('Игра не найдена или ошибка:', error.message);
                    return;
                }
                
                if (data) {
                    if (data.status === 'finished' && !gameCompleted) {
                        gameCompleted = true;
                        clearInterval(pollInterval);
                        switchScreen('leaderboard');
                    }
                    else if (data.status === 'active' && data.current_question) {
                        if (data.current_question !== currentQuestionId) {
                            currentQuestionId = data.current_question;
                            hasAnswered = false;
                            loadQuestion(data.current_question);
                            switchScreen('question');
                        }
                    } 
                    else if (data.status !== 'active' && isQuestionScreenActive && !gameCompleted) {
                        gameCompleted = true;
                        clearInterval(pollInterval);
                        switchScreen('leaderboard');
                    }
                }
            } catch (e) {
                console.error('Ошибка при проверке игры:', e);
            }
        }

        function loadQuestion(questionId) {
            const question = QUESTIONS.find(q => q.id === questionId);
            if (!question) return;
            
            currentQuestion = question;
            
            document.getElementById('questionText').innerText = question.text;
            document.getElementById('questionCounter').innerText = `${questionId}/${QUESTIONS.length}`;
            
            const optionsHtml = question.options.map((opt, i) => `
                <div class="option" onclick="selectAnswer(${i})">
                    <div class="option-letter">${String.fromCharCode(65 + i)}</div>
                    <div>${opt}</div>
                </div>
            `).join('');
            document.getElementById('optionsContainer').innerHTML = optionsHtml;
            document.getElementById('answerStatus').innerHTML = '⏳ Выбери ответ';
            document.getElementById('answerStatus').className = 'status waiting';
        }

        window.selectAnswer = async (index) => {
            if (hasAnswered || !currentQuestion || !gameCode || !playerName) return;
            
            hasAnswered = true;
            
            document.querySelectorAll('.option').forEach((opt, i) => {
                if (i === index) opt.classList.add('selected');
            });
            
            const isCorrect = (index === currentQuestion.correct);
            
            const statusDiv = document.getElementById('answerStatus');
            statusDiv.textContent = isCorrect ? "✅ ПРАВИЛЬНО!" : "❌ НЕПРАВИЛЬНО";
            statusDiv.className = isCorrect ? "status correct" : "status wrong";
            
            try {
                const { error: answerError } = await SB
                    .from('answers')
                    .insert({
                        game_code: gameCode,
                        question_id: currentQuestion.id,
                        player_name: playerName,
                        answer_index: index,
                        is_correct: isCorrect,
                        answered_at: Date.now()
                    });
                
                if (answerError) throw answerError;
                
                if (isCorrect) {
                    playerScore += currentQuestion.points;
                    document.getElementById('displayScore').innerText = playerScore;
                    
                    await SB
                        .from('players')
                        .update({ 
                            score: playerScore, 
                            answered: true 
                        })
                        .eq('game_code', gameCode)
                        .eq('name', playerName);
                } else {
                    await SB
                        .from('players')
                        .update({ answered: true })
                        .eq('game_code', gameCode)
                        .eq('name', playerName);
                }
                
            } catch (e) {
                console.error('Ошибка сохранения ответа:', e);
                hasAnswered = false;
            }
        };

        window.leaveGame = () => {
            if (pollInterval) clearInterval(pollInterval);
            resetGameState();
            switchScreen('join');
        };

        window.playAgain = () => {
            resetGameState();
            switchScreen('join');
        };

        function resetGameState() {
            gameCode = null;
            playerName = null;
            currentQuestion = null;
            hasAnswered = false;
            currentQuestionId = null;
            playerScore = 0;
            isQuestionScreenActive = false;
            gameCompleted = false;
            playerNameInput.value = '';
            gameCodeInput.value = '';
            document.getElementById('displayScore').innerText = '0';
        }
    </script>
</body>
</html>
